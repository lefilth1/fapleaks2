<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category | Fapleaks</title>
  <meta name="description" content="">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="rating" content="adult">
  <meta name="theme-color" content="#6366f1">
  <link rel="canonical" href="">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:url" content="">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/assets/css/custom.css">
</head>
<body>

<header id="navbar"></header>

<main id="main-content">

  <div class="page-header" id="cat-header" style="display:none">
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
      <span id="cat-color-bar" style="display:block;width:6px;height:3rem;border-radius:3px;flex-shrink:0"></span>
      <div>
        <h1 class="page-title" id="cat-title"></h1>
        <p class="page-desc" id="cat-desc"></p>
      </div>
    </div>
  </div>

  <div class="filter-bar" id="cat-filter" style="display:none;margin-top:1rem">
    <div class="filter-container">
      <button class="filter-btn active" data-sort="popular" onclick="setSort('popular')"><i class="fas fa-fire-alt"></i> Popular</button>
      <button class="filter-btn"        data-sort="recent"  onclick="setSort('recent')"><i class="fas fa-clock"></i> Recent</button>
    </div>
  </div>

  <section class="videos-grid" id="videos-grid" aria-label="Category videos">
    <div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
  </section>

  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button id="load-more-btn" onclick="loadMore()"><i class="fas fa-plus-circle"></i>&nbsp; Load More</button>
  </div>

</main>

<footer id="footer"></footer>

<script src="/assets/js/utils.js"></script>
<script src="/assets/js/layout.js"></script>
<script>
const PER_PAGE = 24;
const BATCH    = 12;
let catVideos   = [];
let sorted      = [];
let loaded      = 0;
let currentSort = 'popular';

async function init() {
  const slug = Utils.slugFromPath('category');
  if (!slug) { Utils.show404('Category not found'); return; }

  const videos = await Utils.getVideos();
  catVideos = videos.filter(v => v.category_slug === slug);

  if (!catVideos.length) { Utils.show404(`No videos found in this category`); return; }

  const sample = catVideos[0];
  const catName  = sample.category;
  const catColor = sample.category_color;

  const desc = `Watch ${catVideos.length} exclusive ${catName} videos in HD. Free on Fapleaks.`;
  Utils.setMeta(`${catName} Videos`, desc);
  document.querySelector('link[rel="canonical"]')?.setAttribute('href', `https://fapleaks.com/category/${slug}`);

  document.getElementById('cat-header').style.display = '';
  document.getElementById('cat-filter').style.display = '';
  document.getElementById('cat-color-bar').style.background = catColor;
  document.getElementById('cat-title').innerHTML =
    `<span style="color:${catColor}">${Utils.esc(catName)}</span>`;
  document.getElementById('cat-desc').textContent =
    `${catVideos.length} videos in this collection`;

  sorted = Utils.sortVideos(catVideos, currentSort);
  renderPage();
}

function renderPage() {
  const grid  = document.getElementById('videos-grid');
  const slice = sorted.slice(0, PER_PAGE);
  loaded = slice.length;
  grid.innerHTML = slice.map((v, i) => Utils.videoCardHTML(v, i < 4)).join('');
  document.getElementById('load-more-wrap').style.display = loaded < sorted.length ? 'flex' : 'none';
}

function loadMore() {
  const btn = document.getElementById('load-more-btn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading…';
  btn.disabled  = true;
  setTimeout(() => {
    const slice = sorted.slice(loaded, loaded + BATCH);
    document.getElementById('videos-grid').insertAdjacentHTML('beforeend',
      slice.map(v => Utils.videoCardHTML(v)).join(''));
    loaded += slice.length;
    btn.innerHTML = '<i class="fas fa-plus-circle"></i>&nbsp; Load More';
    btn.disabled  = false;
    if (loaded >= sorted.length) document.getElementById('load-more-wrap').style.display = 'none';
  }, 300);
}

function setSort(sort) {
  currentSort = sort;
  sorted = Utils.sortVideos(catVideos, sort);
  loaded = 0;
  renderPage();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));
}

init().catch(() => Utils.show404('Category not found'));
</script>
</body>
</html>
