<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search | Fapleaks</title>
  <meta name="description" content="Search for videos on Fapleaks.">
  <meta name="robots" content="noindex, follow">
  <meta name="rating" content="adult">
  <meta name="theme-color" content="#6366f1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/assets/css/custom.css">
  <style>
    .search-hero {
      padding: 3rem 1.5rem 1.5rem;
      max-width: 800px; margin: 0 auto; text-align: center;
    }
    .search-hero-title { font-size:1.8rem;font-weight:900;color:#fff;margin-bottom:1.5rem; }
    .search-hero-title span { background:var(--gradient-premium);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
    .big-search-form {
      position: relative; display: flex; gap:.75rem;
    }
    .big-search-input {
      flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
      border-radius:1rem;padding:1rem 1.25rem 1rem 3.5rem;color:#fff;font-size:1rem;
      outline:none;transition:border-color .3s;
    }
    .big-search-input:focus { border-color:var(--brand-primary); }
    .big-search-input::placeholder { color:#475569; }
    .big-search-icon { position:absolute;left:1.25rem;top:50%;transform:translateY(-50%);color:#475569;font-size:1rem; }
    .big-search-btn {
      padding:1rem 1.75rem;border-radius:1rem;background:var(--brand-primary);
      color:#fff;border:none;font-weight:700;cursor:pointer;transition:background .2s;flex-shrink:0;
    }
    .big-search-btn:hover { background:var(--brand-secondary); }
    #results-header { max-width:1600px;margin:0 auto;padding:0 1.5rem 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem; }
    .results-count { font-size:.8rem;font-weight:700;color:#64748b; }
    .results-count strong { color:#fff; }
    #no-results { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;text-align:center;padding:3rem 1.5rem; }
    .no-results-icon { font-size:4rem;margin-bottom:1.5rem;opacity:.3; }
    .no-results-title { font-size:1.4rem;font-weight:900;color:#fff;margin-bottom:.5rem; }
    .no-results-sub { color:#475569;font-size:.9rem; }
  </style>
</head>
<body>

<header id="navbar"></header>

<main id="main-content">

  <div class="search-hero">
    <h1 class="search-hero-title">Search <span>Videos</span></h1>
    <form class="big-search-form" onsubmit="doSearch(event)">
      <i class="fas fa-search big-search-icon"></i>
      <input class="big-search-input" type="search" id="search-input"
             placeholder="Search titles, models, categories…" autocomplete="off">
      <button class="big-search-btn" type="submit"><i class="fas fa-search"></i> Search</button>
    </form>
  </div>

  <div id="results-header" style="display:none">
    <p class="results-count" id="results-count"></p>
    <div class="filter-container" style="padding:4px">
      <button class="filter-btn active" data-sort="relevance" onclick="setSort('relevance')"><i class="fas fa-bullseye"></i> Relevant</button>
      <button class="filter-btn"        data-sort="popular"   onclick="setSort('popular')"><i class="fas fa-fire-alt"></i> Popular</button>
      <button class="filter-btn"        data-sort="recent"    onclick="setSort('recent')"><i class="fas fa-clock"></i> Recent</button>
    </div>
  </div>

  <section class="videos-grid" id="videos-grid" aria-label="Search results" style="display:none"></section>

  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button id="load-more-btn" onclick="loadMore()"><i class="fas fa-plus-circle"></i>&nbsp; Load More</button>
  </div>

  <div id="no-results" style="display:none">
    <div class="no-results-icon">🔍</div>
    <h2 class="no-results-title" id="no-results-title">No results found</h2>
    <p class="no-results-sub" id="no-results-sub">Try a different keyword</p>
    <a href="/" class="btn-primary px-6 py-3 rounded-2xl font-bold text-white mt-6"
       style="margin-top:1.5rem;padding:.8rem 2rem;border-radius:1rem">← Browse All Videos</a>
  </div>

  <!-- initial empty state -->
  <div id="empty-state" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;text-align:center;padding:3rem 1.5rem">
    <div style="font-size:4rem;opacity:.15;margin-bottom:1.5rem">🎬</div>
    <p style="color:#475569;font-size:.95rem">Type something above to search</p>
  </div>

</main>

<footer id="footer"></footer>

<script src="/assets/js/utils.js"></script>
<script src="/assets/js/layout.js"></script>
<script>
const PER_PAGE = 24;
const BATCH    = 12;
let allVideos   = [];
let results     = [];
let sorted      = [];
let loaded      = 0;
let currentSort = 'relevance';
let currentQuery = '';

async function init() {
  allVideos = await Utils.getVideos();
  const q = Utils.getQueryParam('q').trim();
  if (q) {
    document.getElementById('search-input').value = q;
    runSearch(q);
  }
}

function doSearch(e) {
  if (e) e.preventDefault();
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  history.replaceState(null, '', `/search?q=${encodeURIComponent(q)}`);
  runSearch(q);
}

function runSearch(q) {
  currentQuery = q.toLowerCase();
  document.title = `"${q}" Search | Fapleaks`;

  // Score & filter
  results = allVideos.map(v => {
    const titleMatch = v.title.toLowerCase().includes(currentQuery) ? 3 : 0;
    const modelMatch = (v.model || '').toLowerCase().includes(currentQuery) ? 2 : 0;
    const catMatch   = (v.category || '').toLowerCase().includes(currentQuery) ? 1 : 0;
    const score = titleMatch + modelMatch + catMatch;
    return { ...v, _score: score };
  }).filter(v => v._score > 0).sort((a, b) => b._score - a._score);

  if (!results.length) {
    showNoResults(q);
    return;
  }

  currentSort = 'relevance';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === 'relevance'));
  sorted = [...results];
  loaded = 0;

  // Show UI
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('no-results').style.display  = 'none';
  document.getElementById('results-header').style.display = 'flex';
  document.getElementById('videos-grid').style.display = 'grid';
  document.getElementById('results-count').innerHTML =
    `<strong>${results.length}</strong> result${results.length !== 1 ? 's' : ''} for "<strong>${Utils.esc(q)}</strong>"`;

  renderPage();
}

function renderPage() {
  const grid  = document.getElementById('videos-grid');
  const slice = sorted.slice(0, PER_PAGE);
  loaded = slice.length;
  grid.innerHTML = slice.map((v, i) => Utils.videoCardHTML(v, i < 4)).join('');
  document.getElementById('load-more-wrap').style.display = loaded < sorted.length ? 'flex' : 'none';
}

function loadMore() {
  const btn = document.getElementById('load-more-btn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading…';
  btn.disabled  = true;
  setTimeout(() => {
    const slice = sorted.slice(loaded, loaded + BATCH);
    document.getElementById('videos-grid').insertAdjacentHTML('beforeend',
      slice.map(v => Utils.videoCardHTML(v)).join(''));
    loaded += slice.length;
    btn.innerHTML = '<i class="fas fa-plus-circle"></i>&nbsp; Load More';
    btn.disabled  = false;
    if (loaded >= sorted.length) document.getElementById('load-more-wrap').style.display = 'none';
  }, 300);
}

function setSort(sort) {
  currentSort = sort;
  if (sort === 'popular') sorted = [...results].sort((a,b) => b.views - a.views);
  else if (sort === 'recent') sorted = [...results].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  else sorted = [...results].sort((a,b) => b._score - a._score);
  loaded = 0;
  renderPage();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));
}

function showNoResults(q) {
  document.getElementById('empty-state').style.display    = 'none';
  document.getElementById('results-header').style.display = 'none';
  document.getElementById('videos-grid').style.display    = 'none';
  document.getElementById('load-more-wrap').style.display = 'none';
  document.getElementById('no-results').style.display     = 'flex';
  document.getElementById('no-results-title').textContent = `No results for "${q}"`;
  document.getElementById('no-results-sub').textContent   = 'Try a different keyword or browse our categories.';
}

init();
</script>
</body>
</html>
