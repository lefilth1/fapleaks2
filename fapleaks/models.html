<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Stars & Models | Fapleaks</title>
  <meta name="description" content="Browse all stars and models on Fapleaks. Find your favourite creator and watch their exclusive leaked videos.">
  <meta name="robots" content="index, follow">
  <meta name="rating" content="adult">
  <meta name="theme-color" content="#6366f1">
  <link rel="canonical" href="https://fapleaks.com/models">
  <meta property="og:title" content="All Stars & Models | Fapleaks">
  <meta property="og:description" content="Browse all stars and models on Fapleaks.">
  <meta property="og:url" content="https://fapleaks.com/models">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/assets/css/custom.css">
  <style>
    .models-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.5rem;
      padding: 2rem 1.5rem;
      max-width: 1600px;
      margin: 0 auto;
    }
    @media(max-width:480px){ .models-grid{ grid-template-columns: repeat(3,1fr); gap:1rem; padding:1rem; } }
    .model-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 1.5rem 1rem 1.2rem;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 1.5rem;
      transition: all .3s cubic-bezier(.4,0,.2,1);
      cursor: pointer; text-decoration: none;
    }
    .model-card:hover {
      background: rgba(99,102,241,.08);
      border-color: rgba(99,102,241,.35);
      transform: translateY(-5px);
      box-shadow: 0 20px 50px rgba(99,102,241,.15);
    }
    .model-avatar {
      width: 80px; height: 80px; border-radius: 50%; overflow: hidden;
      border: 3px solid rgba(255,255,255,.08);
      margin-bottom: .9rem; background: #1e1e2e;
      transition: border-color .3s;
    }
    .model-card:hover .model-avatar { border-color: var(--brand-primary); }
    .model-avatar img { width:100%;height:100%;object-fit:cover;transition:transform .6s; }
    .model-card:hover .model-avatar img { transform:scale(1.1); }
    .model-initial {
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      font-size:1.8rem;font-weight:900;color:#fff;
    }
    .model-name {
      font-size:.82rem;font-weight:700;color:#94a3b8;text-align:center;
      line-height:1.3;transition:color .2s;
    }
    .model-card:hover .model-name { color:#fff; }
    .model-count { font-size:.65rem;color:#475569;margin-top:.3rem; }

    .search-models-wrap {
      max-width:500px;margin:0 auto;padding:.5rem 1.5rem 0;
    }
    .search-models-wrap input {
      width:100%;background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);border-radius:1rem;
      padding:.85rem 1.2rem;color:#fff;font-size:.9rem;
      outline:none;transition:border-color .3s;
    }
    .search-models-wrap input:focus { border-color:var(--brand-primary); }
    .search-models-wrap input::placeholder { color:#475569; }
  </style>
</head>
<body>

<header id="navbar"></header>

<main id="main-content">

  <div class="page-header">
    <h1 class="page-title">All <span>Stars</span></h1>
    <p class="page-desc" id="model-count-desc">Loading…</p>
  </div>

  <div class="search-models-wrap">
    <input type="search" id="model-search" placeholder="🔍  Search models…" oninput="filterModels(this.value)" autocomplete="off">
  </div>

  <div class="filter-bar" style="margin-top:1rem">
    <div class="filter-container">
      <button class="filter-btn active" data-sort="popular" onclick="setSort('popular')"><i class="fas fa-fire-alt"></i> Most Videos</button>
      <button class="filter-btn"        data-sort="az"      onclick="setSort('az')"><i class="fas fa-sort-alpha-down"></i> A – Z</button>
    </div>
  </div>

  <div class="models-grid" id="models-grid">
    <div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
  </div>

  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button id="load-more-btn" onclick="loadMore()"><i class="fas fa-plus-circle"></i>&nbsp; Load More</button>
  </div>

</main>

<footer id="footer"></footer>

<script src="/assets/js/utils.js"></script>
<script src="/assets/js/layout.js"></script>
<script>
const PER_PAGE = 48;
const BATCH    = 24;
const GRADS    = ['#6366f1','#7c3aed','#db2777','#e11d48','#0891b2','#d97706'];
function initColor(n){ return GRADS[n.charCodeAt(0) % GRADS.length]; }

let allModels     = [];
let filtered      = [];
let displayed     = [];
let loaded        = 0;
let currentSort   = 'popular';
let searchQuery   = '';

async function init() {
  const [models, videos] = await Promise.all([Utils.getModels(), Utils.getVideos()]);

  // Rebuild counts from videos for accuracy
  const countMap = {};
  videos.forEach(v => {
    if (!v.model) return;
    v.model.split(',').map(s => s.trim()).filter(Boolean).forEach(name => {
      const slug = name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
      countMap[slug] = (countMap[slug] || 0) + 1;
    });
  });

  // Merge / enrich
  allModels = Object.entries(countMap).map(([slug, count]) => {
    const existing = models.find(m => m.slug === slug);
    const name = existing?.name || slug.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    return { slug, name, photo: existing?.photo || null, video_count: count };
  }).filter(m => m.video_count > 0);

  document.getElementById('model-count-desc').textContent =
    `${allModels.length} creators with exclusive content`;

  applySort();
}

function applySort() {
  let list = [...allModels];
  if (searchQuery) list = list.filter(m => m.name.toLowerCase().includes(searchQuery));
  if (currentSort === 'az') list.sort((a,b) => a.name.localeCompare(b.name));
  else list.sort((a,b) => b.video_count - a.video_count);
  filtered = list;
  loaded   = 0;
  renderPage();
}

function renderPage() {
  const grid  = document.getElementById('models-grid');
  const slice = filtered.slice(0, PER_PAGE);
  loaded = slice.length;
  grid.innerHTML = slice.map(m => modelCardHTML(m)).join('');
  document.getElementById('load-more-wrap').style.display = loaded < filtered.length ? 'flex' : 'none';
}

function loadMore() {
  const btn = document.getElementById('load-more-btn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading…';
  btn.disabled  = true;
  setTimeout(() => {
    const slice = filtered.slice(loaded, loaded + BATCH);
    document.getElementById('models-grid').insertAdjacentHTML('beforeend', slice.map(m => modelCardHTML(m)).join(''));
    loaded += slice.length;
    btn.innerHTML = '<i class="fas fa-plus-circle"></i>&nbsp; Load More';
    btn.disabled  = false;
    if (loaded >= filtered.length) document.getElementById('load-more-wrap').style.display = 'none';
  }, 300);
}

function modelCardHTML(m) {
  const color = initColor(m.name);
  const avatarHTML = m.photo
    ? `<img src="${Utils.esc(m.photo)}" alt="${Utils.esc(m.name)}" loading="lazy"
           onerror="this.outerHTML='<div class=\\'model-initial\\'style=\\'background:linear-gradient(135deg,${color} 0%,#0f172a 100%)\\'>${Utils.esc(m.name.charAt(0).toUpperCase())}</div>'">`
    : `<div class="model-initial" style="background:linear-gradient(135deg,${color} 0%,#0f172a 100%)">${Utils.esc(m.name.charAt(0).toUpperCase())}</div>`;
  return `
  <a href="/model/${m.slug}" class="model-card">
    <div class="model-avatar">${avatarHTML}</div>
    <span class="model-name">${Utils.esc(m.name)}</span>
    <span class="model-count">${m.video_count} video${m.video_count !== 1 ? 's' : ''}</span>
  </a>`;
}

function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));
  applySort();
}

function filterModels(q) {
  searchQuery = q.toLowerCase().trim();
  applySort();
}

init().catch(() => {
  document.getElementById('models-grid').innerHTML =
    '<p style="color:#64748b;grid-column:1/-1;text-align:center;padding:4rem">Failed to load models.</p>';
});
</script>
</body>
</html>
