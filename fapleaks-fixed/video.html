<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <base href="/fapleaks/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Video | Fapleaks</title>
  <meta name="description" content="">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="rating" content="adult">
  <meta name="theme-color" content="#6366f1">
  <link rel="canonical" href="">
  <meta property="og:type" content="video.other">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:image" content="">
  <meta property="og:url" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="assets/css/custom.css">
  <style>
    .video-layout { display:flex; gap:2.5rem; max-width:1600px; margin:0 auto; padding:2rem 1.5rem; }
    .video-main   { flex:1; min-width:0; }
    .video-sidebar{ width:340px; flex-shrink:0; }
    @media(max-width:1024px){ .video-layout{flex-direction:column;} .video-sidebar{width:100%;} }
    .video-meta-row { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:1rem; margin:1.5rem 0; padding-bottom:1.5rem; border-bottom:1px solid rgba(255,255,255,.05); }
    .meta-pill { display:flex; align-items:center; gap:.5rem; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:999px; padding:.45rem 1rem; font-size:.75rem; font-weight:700; color:#94a3b8; }
    .meta-pill i { color:var(--brand-primary); }
    .action-btns { display:flex; gap:.75rem; }
    .like-btn { display:flex; align-items:center; gap:.5rem; padding:.6rem 1.4rem; border-radius:1rem; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:#fff; font-size:.8rem; font-weight:700; cursor:pointer; transition:var(--transition); }
    .like-btn:hover,.like-btn.liked { background:var(--brand-primary); border-color:var(--brand-primary); }
    .share-btn { padding:.6rem 1rem; border-radius:1rem; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); color:#94a3b8; cursor:pointer; transition:var(--transition); }
    .share-btn:hover { background:rgba(255,255,255,.08); color:#fff; }
    .starring-section { margin:1.75rem 0; }
    .starring-label { font-size:.6rem; text-transform:uppercase; letter-spacing:.3em; font-weight:900; color:#475569; margin-bottom:1rem; }
    .actor-pill { display:flex; align-items:center; gap:.75rem; padding:.4rem 1.2rem .4rem .4rem; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); border-radius:999px; transition:var(--transition); text-decoration:none; }
    .actor-pill:hover { background:rgba(99,102,241,.12); border-color:rgba(99,102,241,.3); }
    .actor-pill-img { width:2.8rem; height:2.8rem; border-radius:50%; overflow:hidden; background:#1e1e2e; border:2px solid rgba(255,255,255,.1); flex-shrink:0; }
    .actor-pill-img img,.actor-pill-img div { width:100%; height:100%; object-fit:cover; display:flex; align-items:center; justify-content:center; font-size:.9rem; font-weight:900; }
    .actor-pill-name { font-size:.8rem; font-weight:700; color:#cbd5e1; }
    .details-box { background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:1.5rem; padding:1.5rem; display:grid; grid-template-columns:1fr auto; gap:1.5rem; margin:1.75rem 0; }
    @media(max-width:600px){ .details-box{grid-template-columns:1fr;} }
    .details-desc { font-size:.85rem; color:#64748b; line-height:1.7; font-style:italic; }
    .details-meta-label { font-size:.6rem; text-transform:uppercase; letter-spacing:.3em; font-weight:900; color:#334155; margin-bottom:.5rem; }
    .cat-badge { display:inline-flex; align-items:center; gap:.5rem; padding:.55rem 1.1rem; border-radius:1rem; font-size:.7rem; font-weight:900; color:#fff; text-decoration:none; transition:var(--transition); }
    .cat-badge:hover { transform:scale(1.05); }
    .sidebar-title { font-size:1rem; font-weight:900; color:#fff; display:flex; align-items:center; gap:.6rem; margin-bottom:1.25rem; }
    .sidebar-title::before { content:''; display:block; width:4px; height:1.2rem; background:var(--brand-primary); border-radius:2px; }
    .sidebar-grid { display:flex; flex-direction:column; gap:1rem; }
    #load-more-related { width:100%; margin-top:1.25rem; padding:.85rem; border-radius:1.25rem; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); color:#64748b; font-size:.65rem; font-weight:900; text-transform:uppercase; letter-spacing:.25em; cursor:pointer; transition:var(--transition); }
    #load-more-related:hover { background:var(--brand-primary); color:#fff; border-color:var(--brand-primary); }
  </style>
</head>
<body>

<header id="navbar"></header>

<main id="main-content">
  <div class="video-layout">

    <!-- ── Main column ── -->
    <div class="video-main">

      <!-- Player -->
      <div class="video-player-wrap" id="player-wrap">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>

      <!-- Title + meta -->
      <h1 id="video-title" style="font-size:1.8rem;font-weight:900;color:#fff;margin:1.25rem 0 0;line-height:1.2;letter-spacing:-.03em;"></h1>

      <div class="video-meta-row">
        <div style="display:flex;flex-wrap:wrap;gap:.6rem" id="meta-pills"></div>
        <div class="action-btns">
          <button class="like-btn" id="like-btn" onclick="toggleLike()">
            <i class="far fa-heart"></i> Like
          </button>
          <button class="share-btn" onclick="shareVideo()" title="Share">
            <i class="fas fa-share-nodes"></i>
          </button>
        </div>
      </div>

      <!-- Starring -->
      <div class="starring-section" id="starring-section" style="display:none">
        <p class="starring-label">Starring</p>
        <div style="display:flex;flex-wrap:wrap;gap:.75rem" id="actors-list"></div>
      </div>

      <!-- Details -->
      <div class="details-box" id="details-box" style="display:none">
        <div>
          <p class="details-meta-label">Scene Details</p>
          <p class="details-desc" id="video-description"></p>
        </div>
        <div style="border-left:1px solid rgba(255,255,255,.06);padding-left:1.5rem" id="cat-box"></div>
      </div>

    </div>

    <!-- ── Sidebar ── -->
    <aside class="video-sidebar">
      <p class="sidebar-title">Next Scenes</p>
      <div class="sidebar-grid" id="related-grid">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>
      <button id="load-more-related" onclick="loadMoreRelated()" style="display:none">
        Explore More
      </button>
    </aside>

  </div>
</main>

<footer id="footer"></footer>

<script src="assets/js/utils.js"></script>
<script src="assets/js/layout.js"></script>
<script>
const ACTOR_COLORS = ['#4f46e5','#7c3aed','#db2777','#e11d48','#475569'];
function actorColor(name) { return ACTOR_COLORS[name.charCodeAt(0) % ACTOR_COLORS.length]; }

let currentVideo  = null;
let relatedAll    = [];
let relatedLoaded = 0;
const REL_INIT    = 8;
const REL_MORE    = 6;

async function init() {
  const slug = Utils.slugFromPath('video');
  if (!slug) { Utils.show404('Video not found'); return; }

  const videos = await Utils.getVideos();
  const video  = videos.find(v => v.slug === slug);
  if (!video)  { Utils.show404('Video not found'); return; }

  currentVideo = video;

  // ── SEO meta ──
  const desc = `Watch ${video.title}${video.model ? ' – featuring ' + video.model : ''}. Exclusive ${video.category} video in HD. Free on Fapleaks.`;
  Utils.setMeta(video.title, desc, video.thumbnail);
  document.querySelector('meta[property="og:type"]')?.setAttribute('content','video.other');

  // ── Schema.org VideoObject ──
  injectSchema(video);

  // ── Player ──
  renderPlayer(video);

  // ── Title ──
  document.getElementById('video-title').textContent = video.title;

  // ── Meta pills ──
  document.getElementById('meta-pills').innerHTML = `
    <span class="meta-pill"><i class="fas fa-eye"></i>${Utils.formatViews(video.views)} views</span>
    ${video.duration_fmt ? `<span class="meta-pill"><i class="fas fa-clock"></i>${video.duration_fmt}</span>` : ''}
    <span class="meta-pill"><i class="fas fa-calendar-alt"></i>${Utils.timeAgo(video.created_at)}</span>
    <span class="meta-pill" style="background:rgba(99,102,241,.15);color:var(--brand-primary);border-color:rgba(99,102,241,.25)"><i class="fas fa-film"></i>Premium HD</span>`;

  // ── Starring ──
  if (video.model) {
    const actors = video.model.split(',').map(s => s.trim()).filter(Boolean);
    if (actors.length) {
      document.getElementById('starring-section').style.display = '';
      document.getElementById('actors-list').innerHTML = actors.map(name => {
        const norm = name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
        return `<a href="/model/${norm}" class="actor-pill">
          <div class="actor-pill-img">
            <img src="assets/actors/${norm}.jpg" alt="${Utils.esc(name)}"
                 onerror="this.parentNode.innerHTML='<div style=\\'background:${actorColor(name)};color:#fff;font-weight:900;font-size:.85rem\\'>${Utils.esc(name.charAt(0).toUpperCase())}</div>'"
                 style="width:100%;height:100%;object-fit:cover">
          </div>
          <span class="actor-pill-name">${Utils.esc(name)}</span>
        </a>`;
      }).join('');
    }
  }

  // ── Details ──
  if (video.description || video.category) {
    document.getElementById('details-box').style.display = '';
    document.getElementById('video-description').textContent =
      video.description || 'No description available.';
    if (video.category) {
      document.getElementById('cat-box').innerHTML = `
        <p class="details-meta-label">Collection</p>
        <a href="/category/${video.category_slug}" class="cat-badge"
           style="background:linear-gradient(135deg,${video.category_color} 0%,rgba(0,0,0,.4) 100%)">
          <i class="fas fa-folder-open"></i>
          ${Utils.esc(video.category.toUpperCase())}
        </a>`;
    }
  }

  // ── Related videos ──
  relatedAll = videos
    .filter(v => v.id !== video.id && v.category_slug === video.category_slug)
    .sort(() => Math.random() - .5);
  if (!relatedAll.length) relatedAll = videos.filter(v => v.id !== video.id).sort(() => Math.random() - .5);

  renderRelated(REL_INIT);
}

function renderPlayer(video) {
  const wrap = document.getElementById('player-wrap');
  wrap.innerHTML = `
    <div class="video-poster" id="video-poster" onclick="revealPlayer()" role="button"
         aria-label="Play ${Utils.esc(video.title)}">
      <img src="${video.thumbnail}" alt="${Utils.esc(video.title)}" width="1280" height="720"
           fetchpriority="high" loading="eager" style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover">
      <div class="video-poster-overlay">
        <div class="big-play"><i class="fas fa-play"></i></div>
      </div>
    </div>
    <div id="player-container" data-embed="${Utils.esc(video.embed_url)}"></div>`;
}

function revealPlayer() {
  const poster = document.getElementById('video-poster');
  const container = document.getElementById('player-container');
  const embedUrl  = container.dataset.embed;
  if (!embedUrl) return;
  container.innerHTML = `<div class="video-iframe-wrap"><iframe src="${embedUrl}" frameborder="0" scrolling="no" allowfullscreen allow="autoplay; fullscreen"></iframe></div>`;
  poster.remove();
}

function renderRelated(count) {
  const grid  = document.getElementById('related-grid');
  const slice = relatedAll.slice(relatedLoaded, relatedLoaded + count);
  if (relatedLoaded === 0) grid.innerHTML = '';
  grid.insertAdjacentHTML('beforeend', slice.map(v => Utils.relatedCardHTML(v)).join(''));
  relatedLoaded += slice.length;
  const btn = document.getElementById('load-more-related');
  btn.style.display = relatedLoaded < relatedAll.length ? '' : 'none';
}

function loadMoreRelated() { renderRelated(REL_MORE); }

function toggleLike() {
  const btn = document.getElementById('like-btn');
  btn.classList.toggle('liked');
  const icon = btn.querySelector('i');
  icon.classList.toggle('far');
  icon.classList.toggle('fas');
}

function shareVideo() {
  if (navigator.share) {
    navigator.share({ title: currentVideo?.title, url: window.location.href }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(window.location.href).then(() => alert('Link copied!'));
  }
}

function injectSchema(v) {
  const s = v.duration;
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  const iso = `PT${h ? h+'H' : ''}${m ? m+'M' : ''}${sec ? sec+'S' : ''}` || 'PT0S';
  const schema = {
    '@context':'https://schema.org','@type':'VideoObject',
    name: v.title, description: v.description || v.title,
    thumbnailUrl: v.thumbnail,
    uploadDate: v.created_at, duration: iso,
    url: window.location.href, embedUrl: v.embed_url,
    interactionStatistic: { '@type':'InteractionCounter', interactionType:'https://schema.org/WatchAction', userInteractionCount: v.views },
    isFamilyFriendly: false,
    author: { '@type':'Person', name: v.model || 'Fapleaks' },
    publisher: { '@type':'Organization', name:'Fapleaks', url:'https://fapleaks.com' }
  };
  const el = document.createElement('script');
  el.type = 'application/ld+json';
  el.textContent = JSON.stringify(schema);
  document.head.appendChild(el);
}

init().catch(() => Utils.show404('Video not found'));
</script>
</body>
</html>
