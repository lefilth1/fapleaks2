<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <base href="/fapleaks2/fapleaks-fixed/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stars – Premium Performers | Fapleaks</title>
  <meta name="description" content="Browse our full collection of premium performers and content creators. Find your favorite star on Fapleaks.">
  <meta name="robots" content="index, follow">
  <meta name="rating" content="adult">
  <meta name="theme-color" content="#6366f1">
  <link rel="canonical" href="https://fapleaks.com/stars.html">
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Stars – Premium Performers | Fapleaks">
  <meta property="og:description" content="Browse our full collection of premium performers.">
  <meta property="og:url"         content="https://fapleaks.com/stars.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="assets/css/custom.css">
  <style>
    .star-search-wrap {
      padding: 0 1.5rem 1.5rem;
      max-width: 1600px; margin: 0 auto;
    }
    .star-search-box {
      position: relative; max-width: 420px;
    }
    .star-search-box i {
      position: absolute; left: 1.1rem; top: 50%; transform: translateY(-50%); color: #475569;
      transition: color .2s;
    }
    .star-search-box:focus-within i { color: #6366f1; }
    .star-search-box input {
      width: 100%; background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1); border-radius: 1.25rem;
      padding: .9rem 1.2rem .9rem 3rem; color: #fff; font-size: .9rem;
      transition: all .25s;
    }
    .star-search-box input:focus {
      outline: none; border-color: rgba(99,102,241,.5);
      box-shadow: 0 0 0 4px rgba(99,102,241,.1);
    }
    .actors-grid {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      padding: 1rem 1.5rem 3rem;
    }
    .actor-card { cursor: pointer; }
    .actor-count { font-size: .65rem; color: #475569; margin-top: .25rem; font-weight: 600; }
  </style>
</head>
<body>

<!-- ── NAVBAR ─────────────────────────────────────────────────────────────── -->
<nav id="navbar">
  <a href="/fapleaks2/fapleaks-fixed/" class="nav-logo">Fapleaks</a>
  <div class="nav-links" id="nav-links">
    <a href="/fapleaks2/fapleaks-fixed/">Home</a>
    <a href="/fapleaks2/fapleaks-fixed/categories">Categories</a>
    <a href="/fapleaks2/fapleaks-fixed/models" class="active">Stars</a>
  </div>
  <form class="search-form" onsubmit="handleSearch(event)">
    <i class="fas fa-search"></i>
    <input type="search" placeholder="Search videos…" id="nav-search" autocomplete="off">
  </form>
  <button class="mobile-menu-btn" onclick="document.getElementById('nav-links').classList.toggle('open')" aria-label="Menu">
    <i class="fas fa-bars"></i>
  </button>
</nav>

<!-- ── MAIN ───────────────────────────────────────────────────────────────── -->
<main id="main-content">

  <!-- Page header -->
  <div class="page-header">
    <h1 class="page-title">
      Porn <span>Stars</span>
    </h1>
    <p class="page-desc" id="star-count-desc">Loading performers…</p>
  </div>

  <!-- Search filter -->
  <div class="star-search-wrap">
    <div class="star-search-box">
      <i class="fas fa-magnifying-glass"></i>
      <input type="text" id="star-filter" placeholder="Search stars…" autocomplete="off">
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-wrap" id="stars-loader"><div class="spinner"></div></div>

  <!-- Actors grid -->
  <div class="actors-grid" id="actors-grid" style="display:none"></div>

</main>

<!-- ── FOOTER ─────────────────────────────────────────────────────────────── -->
<footer id="footer">
  <div class="footer-logo">Fapleaks</div>
  <nav class="footer-links">
    <a href="/fapleaks2/fapleaks-fixed/">Home</a>
    <a href="/fapleaks2/fapleaks-fixed/categories">Categories</a>
    <a href="/fapleaks2/fapleaks-fixed/models">Stars</a>
    <a href="/fapleaks2/fapleaks-fixed/privacy">Privacy Policy</a>
    <a href="/fapleaks2/fapleaks-fixed/dmca">DMCA</a>
    <a href="/fapleaks2/fapleaks-fixed/terms">Terms</a>
  </nav>
  <p class="footer-copy">&copy; <span id="yr"></span> Fapleaks. All rights reserved. 18+ Only.</p>
</footer>

<script src="assets/js/utils.js"></script>
<script>
const { getModels, esc } = Utils;
document.getElementById('yr').textContent = new Date().getFullYear();

const AVATAR_COLORS = ['#4f46e5','#7c3aed','#db2777','#e11d48','#0891b2','#059669'];
function avatarColor(name) { return AVATAR_COLORS[name.charCodeAt(0) % AVATAR_COLORS.length]; }

let allModels = [];

getModels().then(models => {
  allModels = models.sort((a, b) => b.video_count - a.video_count);
  document.getElementById('star-count-desc').innerHTML =
    `Browse our collection of <strong style="color:#fff">${allModels.length}</strong> premium performers.`;
  renderStars(allModels);
}).catch(() => {
  document.getElementById('stars-loader').innerHTML =
    '<p style="color:#64748b;text-align:center;padding:4rem">Failed to load. Please refresh.</p>';
});

function renderStars(models) {
  const grid = document.getElementById('actors-grid');
  grid.innerHTML = models.map(m => {
    const norm  = m.slug || m.name.toLowerCase().replace(/\s+/g,'').replace(/\./g,'');
    const imgSrc = m.photo || `/assets/actors/${norm}.jpg`;
    const initial = (m.name[0] || '?').toUpperCase();
    const color   = avatarColor(m.name);
    return `
    <a href="/search.html?q=${encodeURIComponent(m.name)}" class="actor-card" data-name="${esc(m.name.toLowerCase())}">
      <div class="actor-avatar">
        <img src="${esc(imgSrc)}" alt="${esc(m.name)}" loading="lazy"
             onerror="this.parentElement.innerHTML='<div class=actor-initial style=background:${color}>${initial}</div>'">
      </div>
      <span class="actor-name">${esc(m.name)}</span>
      <span class="actor-count">${m.video_count} video${m.video_count !== 1 ? 's' : ''}</span>
    </a>`;
  }).join('');

  document.getElementById('stars-loader').style.display = 'none';
  grid.style.display = 'grid';
}

// Live filter
document.getElementById('star-filter').addEventListener('input', function () {
  const q = this.value.toLowerCase().trim();
  if (!q) { renderStars(allModels); return; }
  renderStars(allModels.filter(m => m.name.toLowerCase().includes(q)));
});

function handleSearch(e) {
  e.preventDefault();
  const q = document.getElementById('nav-search').value.trim();
  if (q) location.href = `/fapleaks2/fapleaks-fixed/search?q=${encodeURIComponent(q)}`;
}
</script>
</body>
</html>
